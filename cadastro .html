<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro de Profissional</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f0f0f0;
    padding:40px 20px;
}

.container{
    max-width:1000px;
    margin:auto;
    background:#fff;
    padding:40px;
    border-radius:30px;
}

h1{
    text-align:center;
    margin-bottom:10px;
}

.subtitulo{
    text-align:center;
    margin-bottom:40px;
    color:#555;
}

.section{
    background:#0016FF;
    color:#fff;
    padding:15px 20px;
    border-radius:15px;
    margin:30px 0 20px;
    font-size:22px;
    font-weight:bold;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:18px;
}

input,
select{
    width:100%;
    height:55px;
    border:1px solid #ccc;
    border-radius:15px;
    padding:0 15px;
    font-size:16px;
}

.row{
    display:flex;
    gap:20px;
}

.row .form-group{
    flex:1;
}

.radio-group{
    display:flex;
    gap:30px;
    margin-top:10px;
}

.radio-group label{
    display:flex;
    align-items:center;
    gap:8px;
}

.radio-group input{
    width:auto;
    height:auto;
}

.buttons{
    display:flex;
    justify-content:flex-end;
    gap:15px;
    margin-top:40px;
}

.btn{
    padding:15px 35px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

.btn-cancelar{
    background:#e5e5e5;
}

.btn-cadastrar{
    background:#0016FF;
    color:white;
}
</style>
</head>
<body>

<div class="container">

    <h1>Cadastro de Profissional</h1>
    <p class="subtitulo">
        Preencha os dados para cadastro de profissional da saúde
    </p>

    <div class="section">Dados Pessoais</div>

    <div class="form-group">
        <label>Nome Completo</label>
        <input type="text" placeholder="Insira seu nome completo">
    </div>

    <div class="row">
        <div class="form-group">
            <label>CPF</label>
            <input type="text" placeholder="000.000.000-00">
        </div>

        <div class="form-group">
            <label>Data de Nascimento</label>
            <input type="date">
        </div>
    </div>

    <div class="form-group">
        <label>Sexo</label>

        <div class="radio-group">
            <label>
                <input type="radio" name="sexo">
                Masculino
            </label>

            <label>
                <input type="radio" name="sexo">
                Feminino
            </label>
        </div>
    </div>

    <div class="section">Contato</div>

    <div class="form-group">
        <label>Telefone</label>
        <input type="tel" placeholder="(DDD) 00000-0000">
    </div>

    <div class="form-group">
        <label>E-mail</label>
        <input type="email" placeholder="exemplo@seudominio.com">
    </div>

    <div class="row">
        <div class="form-group">
            <label>Endereço</label>
            <input type="text" placeholder="Nome da rua Nº">
        </div>

        <div class="form-group">
            <label>Cidade</label>
            <input type="text" placeholder="Nome da cidade">
        </div>
    </div>

    <div class="section">Informações Profissionais</div>

    <div class="form-group">
        <label>Profissão</label>
        <select>
            <option>Selecione sua profissão</option>
            <option>Médico</option>
            <option>Enfermeiro</option>
            <option>Fisioterapeuta</option>
            <option>Psicólogo</option>
        </select>
    </div>

    <div class="form-group">
        <label>Registro Profissional (CRM, COREN, etc.)</label>
        <input type="text" placeholder="Insira seu registro profissional">
    </div>

    <div class="form-group">
        <label>Especialidades</label>
        <input type="text" placeholder="Adicionar especialidade">
    </div>

    <div class="form-group">
        <label>Valor por Hora (R$)</label>
        <input type="number" step="0.01" placeholder="0,00">
    </div>

    <div class="section">Segurança</div>

    <div class="form-group">
        <label>Senha</label>
        <input type="password" placeholder="Crie uma senha (mínimo 7 caracteres)">
    </div>

    <div class="buttons">
        <button class="btn btn-cancelar">
            Cancelar
        </button>

        <button class="btn btn-cadastrar">
            Cadastrar
        </button>
    </div>

</div>

</body>
</html>
