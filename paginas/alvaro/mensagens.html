<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensagens - MedHome</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/inicialprofissional.css">
</head>
<body class="chat-body">

    <header class="header">
        <div class="logo">
            <img src="img/logo medhome com nome .png" alt="Logo">
        </div>
        
        <nav class="nav-menu">
            <a href="../nicolas/inicialprofissional.html">Painel</a>
            <a href="solicitacoes.html">Solicitações</a>
            <a href="agendaprofissional.html">Agenda</a>
            <a href="../nicolas/pagamentoscliente.html">Pagamentos</a>
            <a href="mensagens.html" class="nav-mensagens active">Mensagens <span class="badge">4</span></a>
            <a href="pacientes.html">Pacientes</a>
        </nav>

        <div class="perfil-header">
            <div class="perfil-info">
                <span class="nome">Ana Paula de Sousa</span>
                <span class="cargo">Enfermeira</span>
            </div>
            <div class="avatar-header">AP</div>
        </div>
    </header>

    <main class="container chat-layout">
        
        <!-- COLUNA ESQUERDA: LISTA DE CHATS -->
        <aside class="chat-sidebar">
            
            <div class="chat-search-container">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" placeholder="Pesquisar conversa">
                </div>
            </div>

            <div class="chat-filters">
                <button class="filter-pill active">Tudo</button>
                <button class="filter-pill">Não lidas (4)</button>
                <button class="filter-pill">Grupos</button>
                <button class="filter-btn-add">+</button>
            </div>

            <div class="chat-list">
                <!-- Contato Ativo -->
                <div class="chat-item active">
                    <div class="avatar blue">AS</div>
                    <div class="chat-item-info">
                        <h3>Ademir de Souza</h3>
                        <p>Sim, o horário está confirmado.</p>
                    </div>
                </div>

                <!-- Outros Contatos (Exemplos) -->
                <div class="chat-item">
                    <div class="avatar red">MS</div>
                    <div class="chat-item-info">
                        <h3>Maria de Souza</h3>
                        <p>Qual o horário certo para o remédio?</p>
                    </div>
                </div>

                <div class="chat-item">
                    <div class="avatar green">JO</div>
                    <div class="chat-item-info">
                        <h3>João Oliveira</h3>
                        <p>Obrigado pelo atendimento!</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- COLUNA DIREITA: JANELA DO CHAT -->
        <section class="chat-window">
            
            <div class="chat-main-header">
                <div class="avatar blue" style="width: 50px; height: 50px; font-size: 18px;">AS</div>
                <div class="chat-header-info">
                    <h2>Ademir de Souza</h2>
                    <span>Paciente</span>
                </div>
            </div>

            <!-- Área onde ficam as mensagens -->
            <div class="chat-history">
                <!-- Espaço vazio ou mensagens fictícias podem entrar aqui -->
            </div>

            <div class="chat-input-area">
                <button class="btn-anexo">📎</button>
                <input type="text" class="chat-input" placeholder="Digite uma mensagem">
                <button class="btn-enviar">Enviar</button>
            </div>

        </section>

    </main>

</body>
</html>
