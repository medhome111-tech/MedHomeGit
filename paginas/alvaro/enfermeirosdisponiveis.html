<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedHome - Enfermeiros Disponíveis</title>
    <link rel="stylesheet" href="css/enfermeirosdisponiveis.css">
</head>
<body>

<header>
    <div class="logo">
        <img src="img/logo-medhome.png" alt="MedHome">
    </div>

    <div class="localizacao">
        📍 Floriano - PI
    </div>
</header>

<main class="container">

    <div class="busca">
        <input type="text" placeholder="Buscar profissional por nome ou especialidade">
    </div>

    <div class="filtros">
        <button>Avaliação</button>
        <button>Preço</button>
        <button>Tempo de experiência</button>
    </div>

    <section class="titulo">
        <h1>Enfermeiros disponíveis</h1>
        <span>12 profissionais</span>
        <p>Profissionais verificados disponíveis no nosso sistema</p>
    </section>

    <section class="card-profissional">

        <img src="img/enfermeira.png" alt="Ana Paula">

        <div class="info">
            <h2>
                Ana Paula de Sousa
                <span class="verificado">✓ Profissional verificado</span>
            </h2>

            <p>⭐ 4.8 (120 avaliações)</p>
            <p>🩺 4 anos de experiência</p>
            <p>📍 Floriano - PI</p>

            <div class="especialidade">
                Especialidade: Cuidados intensivos - Pós operatório
            </div>
        </div>

        <div class="acoes">
            <div class="preco">R$ 80/hora</div>

            <button class="perfil" onclick="window.location.href='visaoperfilenfermeiro.html'">
                Ver perfil
            </button>

            <button class="contratar" onclick="window.location.href='agendaenfermeira.html'">
                Contratar
            </button>
        </div>

    </section>

</main>

</body>
</html>
