<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedHome - Login</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="container">

    <div class="left">
        <a href="paginainicial.html" title="Ir para a página inicial">
            <img src="img/MedHome.png" alt="Logo MedHome">
        </a>

        <h1>MedHome</h1>
        <p>Seu parceiro em cuidados domiciliar</p>
    </div>

    <div class="right">

        <h2>Bem-vindo!</h2>

        <p class="subtitle">
            Entre com suas credenciais para continuar
        </p>

        <form id="form-login">

            <div class="form-group">
                <label>Email:</label>
                <input type="email" required placeholder="Insira seu endereço de email">
            </div>

            <div class="form-group">
                <label>Senha:</label>
                <input type="password" required placeholder="Insira sua senha">
            </div>

            <div class="forgot">
                <a href="#" id="link-forgot">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="btn-login">
                Entrar
            </button>

        </form>

        <div class="register">
            Não tem uma conta?
            <a href="#" id="link-register">Cadastre-se</a>
        </div>

    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const formLogin = document.getElementById("form-login");
    const linkForgot = document.getElementById("link-forgot");
    const linkRegister = document.getElementById("link-register");

    formLogin.addEventListener("submit", function(e) {
        e.preventDefault();
        window.location.href = "../alan/paginainicialpaciente.html";
    });

    linkForgot.addEventListener("click", function(e) {
        e.preventDefault();
        window.location.href = "recuperarsenha.html";
    });

    linkRegister.addEventListener("click", function(e) {
        e.preventDefault();
        window.location.href = "../alan/cadastropaciente.html";
    });
});
</script>
</body>
</html>
