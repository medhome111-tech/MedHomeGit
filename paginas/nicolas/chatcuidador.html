<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensagens - MedHome</title>

    <link rel="stylesheet" href="css/chatcuidador.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="chat-container">

    <aside class="sidebar">

        <div class="logo">
            <a href="../alan/paginainicialpaciente.html"><img src="img/logo medhome com nome .png" alt="MedHome"></a>
        </div>

        <div class="pesquisa">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input type="text" placeholder="Pesquisar conversa">

        </div>

        <div class="filtros">

            <button class="ativo">Tudo</button>

            <button>Não lidas (4)</button>

            <button>Favoritas</button>

            <button class="novo">
                <i class="fa-solid fa-plus"></i>
            </button>

        </div>

        <div class="lista-conversas">

            <div class="conversa ativa">

                <img src="img/girlcuidadora.png" alt="Paola Monteiro">

                <div>

                    <h4>Paola Monteiro de Sousa</h4>

                    <p>Cuidadora</p>

                </div>

            </div>

        </div>

    </aside>

    <section class="chat">

        <header class="chat-header">

            <img src="img/girlcuidadora.png" alt="Paola Monteiro">

            <div>

                <h2>Paola Monteiro de Sousa</h2>

                <span>Cuidadora</span>

            </div>

        </header>

        <main class="chat-body">

            <div class="mensagem recebida">

                <p>Olá! bom dia, gostaria de agendar um atendimento</p>

                <span>09:10</span>

            </div>

            <div class="mensagem enviada">

                <p>Olá, bom dia como posso te ajudar?.</p>

                <span>09:12</span>

            </div>

        </main>

        <footer class="chat-footer">

            <button class="anexo">

                <i class="fa-solid fa-paperclip"></i>

            </button>

            <input type="text" placeholder="Digite uma mensagem...">

            <button class="enviar">

                <i class="fa-solid fa-paper-plane"></i>

                Enviar

            </button>

        </footer>

    </section>

</div>

</body>

</html>
