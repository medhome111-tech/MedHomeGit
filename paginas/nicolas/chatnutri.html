<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensagens - MedHome</title>

    <link rel="stylesheet" href="css/chatnutri.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="chat-container">

    <!-- ================= SIDEBAR ================= -->

    <aside class="sidebar">

        <div class="logo">
            <img src="img/logo medhome com nome .png" alt="MedHome">
        </div>

        <div class="pesquisa">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input type="text" placeholder="Pesquisar conversa">

        </div>

        <div class="filtros">

            <button class="ativo">Tudo</button>

            <button>Não lidas (4)</button>

            <button>Favoritas</button>

            <button class="novo">
                <i class="fa-solid fa-plus"></i>
            </button>

        </div>

        <div class="lista-conversas">

            <div class="conversa ativa">

                <img src="img/mulher nutri.png" alt="Ana">

                <div>

                    <h4>Ana de Matos</h4>

                    <p>Nutricionista</p>

                </div>

            </div>

            <!-- Novas conversas -->
            <!-- Basta copiar a div acima -->

        </div>

    </aside>

    <!-- ================= CHAT ================= -->

    <section class="chat">

        <header class="chat-header">

            <img src="img/mulher nutri.png" alt="Ana">

            <div>

                <h2>Ana de Matos</h2>

                <span>Nutricionista</span>

            </div>

        </header>

        <!-- Área das mensagens -->

        <main class="chat-body">

            <div class="mensagem recebida">

                <p>Olá! Em que posso ajudar?</p>

                <span>09:10</span>

            </div>

            <div class="mensagem enviada">

                <p>Gostaria de agendar uma consulta.</p>

                <span>09:12</span>

            </div>

        </main>

        <!-- Campo de mensagem -->

        <footer class="chat-footer">

            <button class="anexo">

                <i class="fa-solid fa-paperclip"></i>

            </button>

            <input
                type="text"
                placeholder="Digite uma mensagem...">

            <button class="enviar">

                <i class="fa-solid fa-paper-plane"></i>

                Enviar

            </button>

        </footer>

    </section>

</div>

</body>

</html>
