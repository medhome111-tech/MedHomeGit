<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Paciente | MedHome</title>

    <link rel="stylesheet" href="css/perfilpaciente..css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="pagina">

    <div class="area-voltar">
        <a href="../alan/paginainicialpaciente.html" class="voltar">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
    </div>

    <main class="container">

        <section class="card perfil">

            <div class="foto-paciente">
                <img src="img/velhoademir.png" alt="Ademir de Souza">
            </div>

            <div class="dados-paciente">

                <div class="topo-perfil">

                    <div class="identidade">
                        <h1>Ademir de Souza</h1>
                        <div class="linha"></div>
                        <p>80 anos</p>
                    </div>

                    <a href="#" class="btn-editar">Editar perfil</a>

                </div>

                <div class="detalhes-paciente">

                    <p>
                        <strong>ID:</strong>
                        PC1
                    </p>

                    <p>
                        <strong>Desde:</strong>
                        15/01/2022
                    </p>

                    <p class="ativo">
                        <strong>Ativo:</strong>
                        <span>Sim</span>
                    </p>

                </div>

            </div>

        </section>

        <section class="card contato">

            <h2>Contato</h2>

            <div class="divisor"></div>

            <div class="linha-info">
                <strong>Telefone:</strong>
                <span>(11) 11111-1111</span>
            </div>

            <div class="linha-info">
                <strong>Email:</strong>
                <span>anapaula@gmail.com</span>
            </div>

        </section>

        <section class="card bloco">

            <h2>Cidade residente</h2>

            <div class="conteudo-bloco">
                <i class="fa-solid fa-location-dot"></i>
                <span>Floriano - PI</span>
            </div>

        </section>

        <section class="card bloco endereco">

            <h2>Endereço</h2>

            <div class="conteudo-bloco">
                <i class="fa-solid fa-house"></i>
                <span>Rua Alfredo Pacheco, Centro Nº41</span>
            </div>

        </section>

    </main>

</div>

</body>

</html>
