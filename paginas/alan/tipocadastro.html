<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seleção de Tipo de Cadastro</title>
  <link rel="stylesheet" href="css/tipocadastro.css">
</head>

<body>

  <header class="header">
    <a href="../alvaro/paginainicial.html"><img src="img/logo-medhome.png" alt="Logo MedHome"></a>
    <h1 class="logo-text">MedHome</h1>
  </header>

  <main class="container">

    <h2 class="title">
      Selecione o tipo de cadastro:
    </h2>

    <div class="card-button">
      <div class="button-left">
        <img src="img/paciente.png" alt="Paciente">
        <span class="button-text">Paciente</span>
      </div>

      <img src="img/arrowright.png" alt="arrow-right">
    </div>

    <div class="card-button">
      <div class="button-left">
        <img src="img/profissional.png" alt="Profissional">
        <span class="button-text">Profissional</span>
      </div>

      <img src="img/arrowright.png" alt="arrow-right">
    </div>

  </main>

</body>
</html>
