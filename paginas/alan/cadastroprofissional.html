<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Profissional</title>
  <link rel="stylesheet" href="css/cadastroprofissional.css">
</head>
<body>

<div class="container">

    <div class="back-button"><a href="tipocadastro.html"><img src="img/arrowleft.png"></a></div>
    <h1>Cadastro de Profissional</h1>
    <p class="subtitulo">
        Preencha os dados para cadastro de profissional da saúde
    </p>

    <form>

        <div class="section">Dados Pessoais</div>

        <div class="form-group">
            <label>Nome Completo</label>
            <input type="text" placeholder="Insira seu nome completo" required>
        </div>

        <div class="row">
            <div class="form-group">
                <label>CPF</label>
                <input type="text" placeholder="000.000.000-00" required>
            </div>

            <div class="form-group">
                <label>Data de Nascimento</label>
                <input type="date" required>
            </div>
        </div>

        <div class="form-group">
            <label>Sexo</label>

            <div class="radio-group">
                <label>
                    <input type="radio" name="sexo" value="Masculino" required>
                    Masculino
                </label>

                <label>
                    <input type="radio" name="sexo" value="Feminino" required>
                    Feminino
                </label>
            </div>
        </div>

        <div class="section">Contato</div>

        <div class="form-group">
            <label>Telefone</label>
            <input type="tel" placeholder="(DDD) 00000-0000" required>
        </div>

        <div class="form-group">
            <label>E-mail</label>
            <input type="email" placeholder="exemplo@seudominio.com" required>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Endereço</label>
                <input type="text" placeholder="Nome da rua Nº" required>
            </div>

            <div class="form-group">
                <label>Cidade</label>
                <input type="text" placeholder="Nome da cidade" required>
            </div>
        </div>

        <div class="section">Informações Profissionais</div>

        <div class="form-group">
            <label>Profissão</label>
            <select required>
                <option value="">Selecione sua profissão</option>
                <option value="Medico">Médico</option>
                <option value="Enfermeiro">Enfermeiro</option>
                <option value="Fisioterapeuta">Fisioterapeuta</option>
                <option value="Psicologo">Psicólogo</option>
            </select>
        </div>

        <div class="form-group">
            <label>Registro Profissional (CRM, COREN, etc.)</label>
            <input type="text" placeholder="Insira seu registro profissional" required>
        </div>

        <div class="form-group">
            <label>Especialidades</label>
            <input type="text" placeholder="Adicionar especialidade">
        </div>

        <div class="form-group">
            <label>Valor por Hora (R$)</label>
            <input type="number" step="0.01" placeholder="0,00">
        </div>

        <div class="section">Segurança</div>

        <div class="form-group">
            <label>Senha</label>
            <input type="password" placeholder="Crie uma senha (mínimo 7 caracteres)" minlength="7" required>
        </div>

        <div class="buttons">
            <a href="tipocadastro.html" class="btn btn-cancelar">
                Cancelar
            </a>

            <a href="inicialprofissional.html" class="btn btn-cadastrar">
                Cadastrar
            </a>
        </div>

    </form>

</div>

</body>
</html>
