<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Paciente</title>
    <link rel="stylesheet" href="css/perfilpaciente.css">
</head>
<body>

    <main class="container">

        <button class="back-button">
            <a href="../alvaro/paginaincialpaciente.html"><img src="img/arrowleft.png"></a> 
        </button>

        <section class="profile-card">

            <div class="profile-image">
                <img src="img/idoso.png" alt="Paciente">
            </div>

            <div class="profile-info">

                <h1>Ademir de Souza</h1>

                <hr>

                <p>80 anos</p>

                <p>
                    <strong>ID:</strong> PC1
                </p>

                <p>
                    <strong>Desde:</strong> 15/01/2022
                </p>

                <div class="status">
                    Ativo: Sim
                </div>

            </div>

        </section>

        <section class="info-card">

            <h2>CONTATO</h2>

            <div class="divider"></div>

            <div class="info-row">
                <span class="label">Telefone:</span>
                <span class="value">(11) 11111-1111</span>
            </div>

            <div class="info-row">
                <span class="label">Email:</span>
                <span class="value">anapaula@gmail.com</span>
            </div>

        </section>

        <section class="info-card">

            <h2>CIDADE RESIDENTE</h2>

            <div class="location-item">
                <img src="img/location.png" alt="">
                <span>Floriano - PI</span>
            </div>

        </section>

        <section class="info-card">

            <h2>ENDEREÇO</h2>

            <div class="location-item">
                <span>📍 Rua Alfredo Pacheco, Centro Nº 41</span>
            </div>

        </section>

    </main>

</body>
</html>
