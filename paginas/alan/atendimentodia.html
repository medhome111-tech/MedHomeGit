<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atendimentos de Hoje</title>
    <link rel="stylesheet" href="css/atendimentodia.css">
</head>
<body>

<header class="topo">
    <div class="titulo">
        <span class="voltar">←</span>

        <div>
            <h1>Atendimentos de hoje</h1>
            <p>Exibição das consultas marcadas na data atual.</p>
        </div>
    </div>
</header>

<main class="container">

    <section class="data">
        <div class="icone-data">📅</div>

        <div>
            <h2>Hoje, 20 de março de 2026</h2>
            <p>3 atendimentos agendados para hoje</p>
        </div>
    </section>

    <div class="card">
        <div class="conteudo">

            <div class="imagem-paciente">
                <img src="img/idoso.png" alt="Paciente">
            </div>

            <div class="info">
                <h3>Ademir de Sousa</h3>
                <p>09:00 - Administração de medicação</p>
                <p>📍 Rua Eurípedes de Aguiar, Nº41</p>
            </div>

        </div>

        <div class="acoes">
            <button class="btn-azul">Consultar histórico médico</button>
            <button class="btn-branco">Visualizar detalhes do serviço</button>
            <button class="btn-verde">Iniciar atendimento</button>
        </div>
    </div>

    <div class="card">
        <div class="conteudo">

            <div class="imagem-paciente">
                <img src="img/idoso.png" alt="Paciente">
            </div>

            <div class="info">
                <h3>Roberto da Silva</h3>
                <p>15:00 - Avaliação corporal</p>
                <p>📍 Rua Fernando Marques, Nº41</p>
            </div>

        </div>

        <div class="acoes">
            <button class="btn-azul">Consultar histórico médico</button>
            <button class="btn-branco">Visualizar detalhes do serviço</button>
            <button class="btn-verde">Iniciar atendimento</button>
        </div>
    </div>

</main>

</body>
</html>
