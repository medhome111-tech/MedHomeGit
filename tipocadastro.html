<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tipo de Cadastro</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="header">
    <img src="logo-medhome.png" alt="Logo MedHome">
    <h1 class="logo-text">MedHome</h1>
  </header>

  <main class="container">

    <h2 class="title">
      Selecione o tipo de cadastro:
    </h2>

    <div class="card-button">
      <div class="button-left">
        <img src="paciente.png" alt="Paciente">
        <span class="button-text">Paciente</span>
      </div>

      <span class="arrow">→</span>
    </div>

    <div class="card-button">
      <div class="button-left">
        <img src="profissional.png" alt="Profissional">
        <span class="button-text">Profissional</span>
      </div>

      <span class="arrow">→</span>
    </div>

  </main>

</body>
</html>
